apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: builder-ai-main-ingress
  namespace: builder-ai-core
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: "nginx"
  rules:
  # 1. Main Website Route (The Frontend!)
  - host: "builder.ai"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: builder-ai-frontend
            port:
              number: 80
              
  - host: "www.builder.ai"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: builder-ai-frontend
            port:
              number: 80

  # 2. Previews Route
  - host: "*.previews.builder.ai"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: builder-ai-me-proxy
            port:
              number: 80
  
  # 3. API Gateway Route
  - host: "api.builder.ai"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80