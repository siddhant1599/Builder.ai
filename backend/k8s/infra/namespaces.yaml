# k8s/infra/namespace.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: builder-ai-core

---
# to create a separate ns for previews

apiVersion: v1
kind: Namespace
metadata:
  name: builder-ai-previews

---
# configmap for shared config values across services

apiVersion: v1
kind: ConfigMap
metadata:
  name: builder-ai-shared-config
  namespace: builder-ai-core
data:
  PREVIEW_DOMAIN: "previews.builder.ai"
  PREVIEW_NAMESPACE: "builder-ai-previews"
  PROXY_PORT: "80"
  APP_FRONTEND_URL: "http://builder.ai"
